<style>

</style>

<body>
<div id="hdr">
  <a href="https://augustineiacopelli.github.io/appaday/" title="Back to Portfolio">&larr; AppADay</a>
  <div id="hdr-title">HOP RUNNER</div>

</div>
<div id="game-wrap">
  <canvas id="c"></canvas>
  <div id="overlay">
    <div id="ov-title">HOP RUNNER</div>
    <div id="ov-sub">D-pad: move &mdash; JUMP: hop (double-jump!)<br>THROW bottles at enemies! Collect power-ups!<br>100 hops = 1UP &bull; Stomp the Brewmaster!</div>

    <button id="ov-btn">TAP TO BREW</button>
  </div>
  <div id="controls">
    <div id="dpad">
      <div class="dp-btn" id="dp-left"><svg viewBox="0 0 24 24"><polygon points="16,4 8,12 16,20"/></svg></div>
      <div class="dp-btn" id="dp-right"><svg viewBox="0 0 24 24"><polygon points="8,4 16,12 8,20"/></svg></div>
      <div class="dp-btn" id="dp-up"><svg viewBox="0 0 24 24"><polygon points="4,16 12,8 20,16"/></svg></div>
    </div>

      <div id="btn-throw">
        <svg viewBox="0 0 20 20" style="fill:#AADE55;width:20px;height:20px"><rect x="6" y="3" width="5" height="11" rx="2"/><rect x="7" y="1" width="3" height="4" rx="1"/></svg>
        <span>THROW</span>
      </div>
      <div id="btn-jump">
        <svg viewBox="0 0 24 24" style="fill:#F5E6C0;width:28px;height:28px"><polygon points="4,16 12,6 20,16"/></svg>
        <span>JUMP</span>
      </div>
    </div>
  </div>
</div>
<script>
(function() {

var canvas = document.getElementById('c');
var ctx = canvas.getContext('2d');
var W = 800, H = 450;
canvas.width = W; canvas.height = H;

function resizeCanvas() {
  var wrap = document.getElementById('game-wrap');
  var scale = Math.min(wrap.clientWidth / W, wrap.clientHeight / H);
  canvas.style.width = Math.floor(W * scale) + 'px';
  canvas.style.height = Math.floor(H * scale) + 'px';
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

var GROUND_Y = H - 80;
var GRAVITY = 0.52, JUMP_VEL = -13, MOVE_SPD = 4.8, FRICTION = 0.80;

function deg(d) { return d * Math.PI / 180; }

var WORLDS = [
  {name:'GRAIN FIELDS',    sky1:'#1A3A5A',sky2:'#2E6090',gnd:'#5C4A1E',gnd2:'#3A2C0A',plat:'#7A6030',acc:'#E8C060'},
  {name:'HOP GARDENS',     sky1:'#1A3A1A',sky2:'#2A5A28',gnd:'#3A5A18',gnd2:'#243A0A',plat:'#4A7020',acc:'#8BC34A'},
  {name:'MALT CAVES',      sky1:'#0E0A1E',sky2:'#1E1240',gnd:'#2A1A3A',gnd2:'#180E28',plat:'#3A2A50',acc:'#8060C0'},
  {name:'YEAST SWAMPS',    sky1:'#0E1A08',sky2:'#1A3010',gnd:'#2A3A0A',gnd2:'#182208',plat:'#364E0E',acc:'#88A030'},
  {name:'FERMENT FACTORY', sky1:'#2A0E00',sky2:'#501C00',gnd:'#4A2800',gnd2:'#2E1800',plat:'#6A4010',acc:'#E8800A'},
  {name:'ICE LAGER PEAKS', sky1:'#0A1A2E',sky2:'#1A3050',gnd:'#3A5A7A',gnd2:'#2A4060',plat:'#6A8EA8',acc:'#B0D8F8'},
  {name:'BARREL FORTRESS', sky1:'#1A0800',sky2:'#360E00',gnd:'#4A2800',gnd2:'#2E1800',plat:'#5A3800',acc:'#B87333'},
  {name:'GRAND BREWERY',   sky1:'#0A0600',sky2:'#1A0E00',gnd:'#3A1E00',gnd2:'#220E00',plat:'#5A3010',acc:'#FFD700'}
];

var keys = {left:false, right:false, jump:false, throwBtn:false};
var jumpConsumed = false, throwConsumed = false;
var gs;

function initGs() {
  return {
    running:false, gameOver:false, zoneCleared:false,
    score:0, best:0, lives:3, world:0, zone:0,
    frame:0, invincible:0, camX:0, hopCount:0,
    player:{
      x:80, y:GROUND_Y, vx:0, vy:0, prevY:GROUND_Y,
      w:24, h:48, onGround:true, jumps:0, maxJumps:2,
      runFrame:0, runTimer:0, facingRight:true,
      bottles:0, maxBottles:5, powerType:null, powerTimer:0, throwCooldown:0
    },
    platforms:[], hops:[], enemies:[], projectiles:[],
    playerProjectiles:[], powerups:[], particles:[],
    bubbles:[], stars:[], pits:[],
    flagX:0, boss:null, zoneLen:3200,
    transTimer:0, transitioning:false
  };
}
gs = initGs();

function buildZone(world, zone) {
  var isBoss = (zone === 3);
  gs.zoneLen = isBoss ? 2000 : 3200;
  gs.flagX = gs.zoneLen - 120;
  gs.platforms = []; gs.hops = []; gs.enemies = [];
  gs.projectiles = []; gs.playerProjectiles = [];
  gs.powerups = []; gs.pits = []; gs.boss = null;
  gs.player.x = 80; gs.player.y = GROUND_Y;
  gs.player.vx = 0; gs.player.vy = 0;
  gs.player.onGround = true; gs.player.jumps = 0;
  gs.camX = 0; gs.frame = 0; gs.invincible = 0;
  gs.zoneCleared = false; gs.transitioning = false; gs.transTimer = 0;
  gs.stars = [];
  for (var i = 0; i < 55; i++) {
    gs.stars.push({wx:Math.random()*gs.zoneLen, wy:Math.random()*(GROUND_Y*0.52), r:Math.random()*1.4+0.4});
  }
  if (isBoss) buildBossZone(world);
  else buildNormalZone(world, zone);
}

function buildNormalZone(world, zone) {
  var diff = world * 4 + zone;
  var len = gs.zoneLen;
  var px = 260;
  while (px < len - 200) {
    var pw = 80 + Math.random() * 80;
    var gap = Math.max(75, 115 + Math.random() * 130 - diff * 2);
    var pTopY = Math.max(60, GROUND_Y - 75 - Math.random() * 110 - diff * 1.5);
    gs.platforms.push({wx:px, topY:pTopY, w:pw, h:14});
    if (Math.random() < 0.72) {
      for (var ci = 0; ci < 3; ci++) {
        gs.hops.push({wx:px+12+ci*26, cy:pTopY-20, r:10, collected:false, bobOff:Math.random()*Math.PI*2});
      }
    }
    px += pw + gap;
  }
  var hx = 180;
  while (hx < len - 200) {
    gs.hops.push({wx:hx, cy:GROUND_Y-22, r:10, collected:false, bobOff:Math.random()*Math.PI*2});
    hx += 90 + Math.random() * 120;
  }
  var count = Math.max(3, 3 + zone + world * 2);
  for (var e = 0; e < count; e++) {
    var ewx = 350 + e * (len - 450) / count + Math.random() * 60 - 30;
    var et = Math.random() < 0.55 ? 'keg' : 'goblin';
    gs.enemies.push({type:et, wx:ewx, y:GROUND_Y, w:et==='keg'?36:30, h:et==='keg'?44:48, vx:0, frame:0, timer:0, alive:true, patrolDir:Math.random()<0.5?1:-1, patrolTimer:0});
  }
  var puTypes = ['bottle','bottle','star','speed','bottle'];
  var puCount = 2 + Math.floor(Math.random() * 3);
  var puX = 350;
  for (var pui = 0; pui < puCount; pui++) {
    puX += 300 + Math.random() * 400;
    if (puX > len - 300) break;
    var puType = puTypes[Math.floor(Math.random() * puTypes.length)];
    var placed = false;
    for (var ppli = 0; ppli < gs.platforms.length; ppli++) {
      var ppl = gs.platforms[ppli];
      if (Math.abs(ppl.wx + ppl.w / 2 - puX) < 200 && !placed) {
        gs.powerups.push({type:puType, wx:ppl.wx+ppl.w/2, cy:ppl.topY-18, r:12, collected:false, bobOff:Math.random()*Math.PI*2});
        placed = true;
      }
    }
    if (!placed) gs.powerups.push({type:puType, wx:puX, cy:GROUND_Y-22, r:12, collected:false, bobOff:Math.random()*Math.PI*2});
  }
  var pitCount = zone + world;
  var minPitW = 60 + world * 8, maxPitW = 100 + world * 14 + zone * 10;
  var pitCursor = 400;
  for (var pit = 0; pit < pitCount; pit++) {
    pitCursor += 200 + Math.random() * 300;
    var pitW = minPitW + Math.random() * (maxPitW - minPitW);
    if (pitCursor > 80 && pitCursor + pitW < len - 200) {
      gs.pits.push({wx:pitCursor, w:pitW});
      gs.hops = gs.hops.filter(function(h) {
        return h.cy !== GROUND_Y - 22 || h.wx < pitCursor - 10 || h.wx > pitCursor + pitW + 10;
      });
    }
    pitCursor += pitW;
  }
}

function buildBossZone(world) {
  gs.platforms.push({wx:280, topY:GROUND_Y-105, w:120, h:14});
  gs.platforms.push({wx:480, topY:GROUND_Y-145, w:100, h:14});
  gs.platforms.push({wx:680, topY:GROUND_Y-105, w:120, h:14});
  gs.platforms.push({wx:900, topY:GROUND_Y-80,  w:80,  h:14});
  for (var i = 0; i < 8; i++) {
    gs.hops.push({wx:220+i*160, cy:GROUND_Y-22, r:10, collected:false, bobOff:Math.random()*Math.PI*2});
  }
  var throwInt = Math.max(70, 160 - (world * 4 + 3) * 4);
  gs.boss = {wx:1350, y:GROUND_Y, w:70, h:80, hp:3, maxHp:3, vx:0, frame:0, timer:0, alive:true, phase:'patrol', hurtTimer:0, throwTimer:0, throwInterval:throwInt, world:world};
  gs.flagX = 1820;
}

function wxS(wx) { return wx - gs.camX; }

function overlapFeet(ax, ay, aw, ah, bx, by, bw, bh) {
  return ax < bx+bw && ax+aw > bx && (ay-ah) < by && ay > (by-bh);
}

function update() {
  if (!gs.running) return;
  gs.frame++;
  var p = gs.player;

  if (gs.transitioning) {
    gs.transTimer++;
    if (gs.transTimer > 100) advanceZone();
    return;
  }

  var curSpd = MOVE_SPD * (p.powerType === 'speed' ? 1.85 : 1);
  if (keys.left)       { p.vx = -curSpd; p.facingRight = false; }
  else if (keys.right) { p.vx =  curSpd; p.facingRight = true; }
  else { p.vx *= FRICTION; if (Math.abs(p.vx) < 0.2) p.vx = 0; }

  if (keys.jump && !jumpConsumed) { jumpConsumed = true; doJump(); }
  if (!keys.jump) jumpConsumed = false;

  p.prevY = p.y;
  p.x += p.vx;
  p.vy += GRAVITY;
  p.y += p.vy;

  if (p.x < 0) { p.x = 0; p.vx = 0; }
  if (p.x > gs.zoneLen - p.w) { p.x = gs.zoneLen - p.w; p.vx = 0; }

  p.onGround = false;
  var pCX = p.x + p.w / 2;
  var inPit = false;
  for (var pit = 0; pit < gs.pits.length; pit++) {
    var pt2 = gs.pits[pit];
    if (pCX > pt2.wx && pCX < pt2.wx + pt2.w) { inPit = true; break; }
  }
  if (!inPit && p.y >= GROUND_Y) { p.y = GROUND_Y; p.vy = 0; p.onGround = true; p.jumps = 0; }
  if (p.y > H + 40) { hitPlayer(); p.x = 80; p.y = GROUND_Y; p.vx = 0; p.vy = 0; p.onGround = true; p.jumps = 0; gs.invincible = 120; }

  for (var pi = 0; pi < gs.platforms.length; pi++) {
    var pl = gs.platforms[pi];
    if (p.x + p.w > pl.wx && p.x < pl.wx + pl.w) {
      var pf = p.y - p.vy;
      if (p.vy >= 0 && pf <= pl.topY + 2 && p.y >= pl.topY) {
        p.y = pl.topY; p.vy = 0; p.onGround = true; p.jumps = 0;
      }
    }
  }

  if (p.onGround && Math.abs(p.vx) > 0.3) {
    p.runTimer++;
    if (p.runTimer % 6 === 0) p.runFrame = (p.runFrame + 1) % 8;
  } else if (p.onGround) {
    p.runTimer = 0;
    p.runFrame = Math.floor(gs.frame / 20) % 2 === 0 ? 0 : 1;
  }

  var tCam = p.x - W * 0.38;
  if (tCam < 0) tCam = 0;
  if (tCam > gs.zoneLen - W) tCam = gs.zoneLen - W;
  gs.camX += (tCam - gs.camX) * 0.13;

  if (gs.invincible > 0) gs.invincible--;

  if (!gs.boss && p.x + p.w > gs.flagX && p.x < gs.flagX + 24) {
    gs.zoneCleared = true; gs.score += 200; gs.transitioning = true; gs.transTimer = 0;
  }

  if (p.throwCooldown > 0) p.throwCooldown--;
  if (p.powerType && p.powerTimer > 0) {
    p.powerTimer--;
    if (p.powerTimer <= 0) p.powerType = null;
  }
  if (p.powerType === 'star' && gs.invincible < p.powerTimer) gs.invincible = p.powerTimer;

  if (keys.throwBtn && !throwConsumed) {
    throwConsumed = true;
    if (p.bottles > 0 && p.throwCooldown === 0) {
      p.bottles--;
      p.throwCooldown = 18;
      var tdir = p.facingRight ? 1 : -1;
      gs.playerProjectiles.push({wx:p.x+p.w/2, y:p.y-p.h*0.55, vx:tdir*9, vy:-3.5, alive:true, timer:0});
    }
  }
  if (!keys.throwBtn) throwConsumed = false;

  for (var hi = 0; hi < gs.hops.length; hi++) {
    var h = gs.hops[hi];
    if (h.collected) continue;
    if (overlapFeet(p.x, p.y, p.w, p.h, h.wx-h.r, h.cy+h.r, h.r*2, h.r*2)) {
      h.collected = true; gs.score += 10; gs.hopCount++;
      spawnCollectParts(h.wx, h.cy);
      if (gs.hopCount % 100 === 0) { gs.lives++; spawnLifeUpParts(p.x+p.w/2, p.y-p.h/2); }
    }
  }

  for (var puki = 0; puki < gs.powerups.length; puki++) {
    var pu = gs.powerups[puki];
    if (pu.collected) continue;
    if (overlapFeet(p.x, p.y, p.w, p.h, pu.wx-pu.r, pu.cy+pu.r, pu.r*2, pu.r*2)) {
      pu.collected = true; applyPowerup(pu.type);
    }
  }

  updateEnemies();
  if (gs.boss && gs.boss.alive) updateBoss();
  updateProjectiles();
  updatePlayerProjectiles();

  if (gs.frame % 15 === 0) gs.score++;

  if (gs.frame % 16 === 0) {
    gs.bubbles.push({x:Math.random()*W, y:H, vy:-(0.4+Math.random()*0.8), r:Math.random()*2.5+1, alpha:0.28});
  }
  for (var bi = gs.bubbles.length - 1; bi >= 0; bi--) {
    gs.bubbles[bi].y += gs.bubbles[bi].vy;
    gs.bubbles[bi].alpha -= 0.004;
    if (gs.bubbles[bi].y < 0 || gs.bubbles[bi].alpha <= 0) gs.bubbles.splice(bi, 1);
  }
  for (var pti = gs.particles.length - 1; pti >= 0; pti--) {
    var pt = gs.particles[pti];
    pt.x += pt.vx; pt.y += pt.vy; pt.vy += 0.14;
    pt.life -= 0.035; pt.alpha = Math.max(0, pt.life);
    if (pt.life <= 0) gs.particles.splice(pti, 1);
  }
}

function updateEnemies() {
  var p = gs.player;
  for (var ei = gs.enemies.length - 1; ei >= 0; ei--) {
    var en = gs.enemies[ei];
    if (!en.alive) { gs.enemies.splice(ei, 1); continue; }
    en.timer++; en.frame = Math.floor(en.timer / 7) % 4;
    var dist = en.wx - p.x;
    if (Math.abs(dist) < 900) {
      var spd = 1.4 + gs.world * 0.22 + gs.zone * 0.14;
      en.vx = dist > 0 ? -spd : spd;
    } else {
      en.patrolTimer++;
      if (en.patrolTimer > 80) { en.patrolDir *= -1; en.patrolTimer = 0; }
      en.vx = en.patrolDir * 0.7;
    }
    en.wx += en.vx;
    if (en.wx < 0) en.wx = 0;
    if (en.wx > gs.zoneLen - en.w) en.wx = gs.zoneLen - en.w;
    var eCX = en.wx + en.w / 2;
    for (var epi = 0; epi < gs.pits.length; epi++) {
      var ept = gs.pits[epi];
      if (eCX > ept.wx - 4 && eCX < ept.wx + ept.w + 4) {
        en.wx -= en.vx; en.vx = 0; en.patrolDir *= -1; break;
      }
    }
    if (gs.invincible === 0) {
      var enTop = en.y - en.h;
      var hOvlp = (p.x + p.w > en.wx + 2) && (p.x < en.wx + en.w - 2);
      if (hOvlp && p.vy > 0 && p.prevY <= enTop + 16 && p.y >= enTop) {
        en.alive = false; gs.score += 50;
        p.vy = JUMP_VEL * 0.5; p.jumps = 1;
        spawnStompParts(en.wx + en.w / 2, enTop);
      } else if (hOvlp && overlapFeet(p.x, p.y, p.w, p.h, en.wx, en.y, en.w, en.h)) {
        hitPlayer();
      }
    }
  }
}

function updateBoss() {
  var b = gs.boss, p = gs.player;
  b.timer++; b.frame = Math.floor(b.timer / 8) % 4;
  if (b.phase !== 'dead' && gs.invincible === 0) {
    var bTop = b.y - b.h;
    var hOvlp = (p.x + p.w > b.wx) && (p.x < b.wx + b.w);
    if (hOvlp && p.vy > 0 && p.prevY <= bTop + 20 && p.y >= bTop) {
      b.hp--;
      p.vy = JUMP_VEL * 0.62; p.jumps = 1;
      spawnStompParts(b.wx + b.w / 2, bTop);
      if (b.hp <= 0) { b.phase = 'dead'; b.timer = 0; }
      else { b.phase = 'hurt'; b.hurtTimer = 45; }
      return;
    }
    if (b.phase !== 'hurt' && hOvlp && overlapFeet(p.x, p.y, p.w, p.h, b.wx, b.y, b.w, b.h)) hitPlayer();
  }
  if (b.phase === 'hurt') { b.hurtTimer--; if (b.hurtTimer <= 0) b.phase = b.hp > 0 ? 'patrol' : 'dead'; return; }
  if (b.phase === 'dead') { if (b.timer > 70) { gs.zoneCleared = true; gs.score += 500; gs.transitioning = true; gs.transTimer = 0; } return; }
  var spd = 1.1 + gs.world * 0.18;
  var dist2 = b.wx - gs.player.x;
  b.vx = dist2 > 0 ? -spd : spd; b.wx += b.vx;
  if (b.wx < 180) b.wx = 180;
  if (b.wx > gs.zoneLen - b.w - 60) b.wx = gs.zoneLen - b.w - 60;
  b.throwTimer++;
  if (b.throwTimer >= b.throwInterval) {
    b.throwTimer = 0;
    var dir = gs.player.x < b.wx ? -1 : 1;
    gs.projectiles.push({wx:b.wx+b.w/2, y:b.y-b.h*0.6, vx:dir*4.5, vy:-5.5, w:10, h:18, alive:true, timer:0});
    if (gs.world >= 3) gs.projectiles.push({wx:b.wx+b.w/2, y:b.y-b.h*0.55, vx:dir*0.65*4.5, vy:-5.5, w:10, h:18, alive:true, timer:0});
  }
}

function updateProjectiles() {
  var p = gs.player;
  for (var i = gs.projectiles.length - 1; i >= 0; i--) {
    var pr = gs.projectiles[i];
    if (!pr.alive) { gs.projectiles.splice(i, 1); continue; }
    pr.timer++; pr.wx += pr.vx; pr.vy += 0.36; pr.y += pr.vy;
    if (pr.y >= GROUND_Y) { spawnBottleSplash(pr.wx, GROUND_Y); pr.alive = false; continue; }
    if (wxS(pr.wx) < -50 || wxS(pr.wx) > W + 50) { pr.alive = false; continue; }
    if (gs.invincible === 0) {
      var px1 = pr.wx - pr.w / 2, px2 = pr.wx + pr.w / 2, pTop = pr.y - pr.h;
      if (p.x < px2 && p.x + p.w > px1 && p.y > pTop && p.y - p.h < pr.y) {
        hitPlayer(); pr.alive = false; spawnBottleSplash(pr.wx, pr.y);
      }
    }
  }
}

function updatePlayerProjectiles() {
  var p = gs.player;
  for (var i = gs.playerProjectiles.length - 1; i >= 0; i--) {
    var pr = gs.playerProjectiles[i];
    if (!pr.alive) { gs.playerProjectiles.splice(i, 1); continue; }
    pr.timer++; pr.wx += pr.vx; pr.vy += 0.28; pr.y += pr.vy;
    if (pr.y >= GROUND_Y || wxS(pr.wx) < -20 || wxS(pr.wx) > W + 20) {
      spawnBottleSplash(pr.wx, Math.min(pr.y, GROUND_Y)); pr.alive = false; continue;
    }
    for (var ei2 = gs.enemies.length - 1; ei2 >= 0; ei2--) {
      var en2 = gs.enemies[ei2];
      if (!en2.alive) continue;
      if (pr.wx > en2.wx && pr.wx < en2.wx + en2.w && pr.y > en2.y - en2.h && pr.y < en2.y) {
        en2.alive = false; gs.score += 30;
        spawnStompParts(en2.wx + en2.w / 2, en2.y - en2.h / 2);
        pr.alive = false; break;
      }
    }
    if (pr.alive && gs.boss && gs.boss.alive && gs.boss.phase !== 'dead') {
      var b2 = gs.boss;
      if (pr.wx > b2.wx && pr.wx < b2.wx + b2.w && pr.y > b2.y - b2.h && pr.y < b2.y) {
        b2.hp--; spawnStompParts(b2.wx + b2.w / 2, b2.y - b2.h / 2); pr.alive = false;
        if (b2.hp <= 0) { b2.phase = 'dead'; b2.timer = 0; }
        else { b2.phase = 'hurt'; b2.hurtTimer = 45; }
      }
    }
  }
}

function applyPowerup(type) {
  var p = gs.player;
  if (type === 'bottle') {
    p.bottles = Math.min(p.maxBottles, p.bottles + 3);
    spawnPowerupParts(p.x + p.w / 2, p.y - p.h / 2, '#88AA44');
  } else if (type === 'star') {
    p.powerType = 'star'; p.powerTimer = 480; gs.invincible = 480;
    spawnPowerupParts(p.x + p.w / 2, p.y - p.h / 2, '#FFD700');
  } else if (type === 'speed') {
    p.powerType = 'speed'; p.powerTimer = 480;
    spawnPowerupParts(p.x + p.w / 2, p.y - p.h / 2, '#00CCFF');
  }
}

function advanceZone() {
  gs.transitioning = false;
  var nz = gs.zone + 1;
  if (nz >= 4) { nz = 0; var nw = gs.world + 1; if (nw >= 8) { showVictory(); return; } gs.world = nw; }
  gs.zone = nz; buildZone(gs.world, gs.zone);
}

function doJump() {
  var p = gs.player;
  if (p.jumps < p.maxJumps) {
    p.vy = JUMP_VEL * (p.jumps === 0 ? 1 : 0.78);
    p.jumps++; p.onGround = false; spawnJumpParts();
  }
}

function hitPlayer() { gs.lives--; gs.invincible = 90; if (gs.lives <= 0) endGame(); }
function spawnJumpParts() { var p = gs.player; for (var i = 0; i < 6; i++) gs.particles.push({x:p.x+p.w/2, y:p.y, vx:(Math.random()-0.5)*3.5, vy:Math.random()*-1.5, life:0.9, r:3, color:'#FFFDE7', alpha:1}); }
function spawnCollectParts(wx2, wy) { for (var i = 0; i < 8; i++) { var a = (Math.PI*2/8)*i; gs.particles.push({x:wx2-gs.camX, y:wy, vx:Math.cos(a)*3, vy:Math.sin(a)*2.5, life:1, r:3, color:'#8BC34A', alpha:1}); } }
function spawnStompParts(wx2, wy) { for (var i = 0; i < 14; i++) { var a = (Math.PI*2/14)*i; gs.particles.push({x:wx2-gs.camX, y:wy, vx:Math.cos(a)*4.5, vy:Math.sin(a)*3.5, life:1.1, r:4, color:'#E8800A', alpha:1}); } }
function spawnBottleSplash(wx2, wy) { for (var i = 0; i < 8; i++) { var a = (Math.PI*2/8)*i; gs.particles.push({x:wxS(wx2), y:wy, vx:Math.cos(a)*3, vy:Math.sin(a)*2.5-1, life:0.9, r:4, color:'#88CCFF', alpha:1}); } }
function spawnPowerupParts(cx, cy, col) { for (var i = 0; i < 16; i++) { var a = (Math.PI*2/16)*i; gs.particles.push({x:cx-gs.camX, y:cy, vx:Math.cos(a)*5, vy:Math.sin(a)*4, life:1.2, r:5, color:col, alpha:1}); } }
function spawnLifeUpParts(cx, cy) { for (var i = 0; i < 20; i++) { var a = (Math.PI*2/20)*i; gs.particles.push({x:cx-gs.camX, y:cy, vx:Math.cos(a)*6, vy:Math.sin(a)*5-2, life:1.5, r:6, color:'#FF88AA', alpha:1}); } }

// DRAW
function draw() {
  ctx.clearRect(0, 0, W, H);
  var wt = WORLDS[gs.world];
  drawBG(wt); drawPlatforms(wt); drawGround(wt);
  drawFlag(); drawHops(); drawPowerups();
  drawEnemies(); drawProjectiles(); drawPlayerProjectiles();
  drawParticles(); drawPlayer();
  if (gs.boss && gs.boss.alive) drawBoss();
  drawHUD(wt);
  if (gs.transitioning) drawTransition();
}

function drawBG(wt) {
  var grad = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
  grad.addColorStop(0, wt.sky1); grad.addColorStop(1, wt.sky2);
  ctx.fillStyle = grad; ctx.fillRect(0, 0, W, GROUND_Y);
  for (var i = 0; i < gs.stars.length; i++) {
    var s = gs.stars[i], sx = (s.wx - gs.camX * 0.12) % W;
    if (sx < 0) sx += W;
    ctx.globalAlpha = 0.45 + 0.3 * Math.sin(gs.frame * 0.004 + i);
    ctx.fillStyle = '#F5E6C0'; ctx.fillRect(sx, s.wy, s.r * 2, s.r * 2);
  }
  ctx.globalAlpha = 1;
  ctx.fillStyle = '#FFF9C4'; ctx.beginPath(); ctx.arc(W-70, 38, 20, 0, Math.PI*2); ctx.fill();
  for (var bi = 0; bi < gs.bubbles.length; bi++) {
    var bub = gs.bubbles[bi];
    ctx.globalAlpha = bub.alpha; ctx.strokeStyle = '#F5E6C0'; ctx.lineWidth = 0.8;
    ctx.beginPath(); ctx.arc(bub.x, bub.y, bub.r, 0, Math.PI*2); ctx.stroke();
  }
  ctx.globalAlpha = 1;
}

function drawGround(wt) {
  ctx.fillStyle = wt.gnd; ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);
  ctx.fillStyle = wt.gnd2; ctx.fillRect(0, GROUND_Y, W, 8);
  var sw = 44, sh = 20;
  ctx.strokeStyle = 'rgba(0,0,0,0.3)'; ctx.lineWidth = 1;
  for (var row = 0; row < 3; row++) {
    var off = (row % 2) * (sw / 2), ry = GROUND_Y + 8 + row * sh;
    var startX = -(gs.camX % sw) + off - sw;
    for (var col = 0; col < Math.ceil(W / sw) + 2; col++) ctx.strokeRect(startX + col * sw, ry, sw - 2, sh - 2);
  }
  for (var pi3 = 0; pi3 < gs.pits.length; pi3++) {
    var pit2 = gs.pits[pi3], psx = wxS(pit2.wx);
    if (psx + pit2.w < 0 || psx > W) continue;
    ctx.fillStyle = '#050000'; ctx.fillRect(psx, GROUND_Y, pit2.w, H - GROUND_Y);
    ctx.fillStyle = wt.gnd; ctx.fillRect(psx - 3, GROUND_Y, 3, H - GROUND_Y);
    ctx.fillStyle = wt.gnd; ctx.fillRect(psx + pit2.w, GROUND_Y, 3, H - GROUND_Y);
    ctx.fillStyle = 'rgba(255,60,0,0.5)';
    ctx.fillRect(psx - 2, GROUND_Y, 2, 12); ctx.fillRect(psx + pit2.w, GROUND_Y, 2, 12);
  }
}

function drawPlatforms(wt) {
  for (var pi = 0; pi < gs.platforms.length; pi++) {
    var pl = gs.platforms[pi], sx = wxS(pl.wx);
    if (sx + pl.w < -10 || sx > W + 10) continue;
    ctx.fillStyle = wt.plat; ctx.fillRect(sx, pl.topY, pl.w, pl.h);
    ctx.fillStyle = wt.acc; ctx.fillRect(sx, pl.topY, pl.w, 4);
    ctx.fillStyle = 'rgba(255,255,255,0.12)';
    ctx.fillRect(sx, pl.topY, 3, pl.h); ctx.fillRect(sx + pl.w - 3, pl.topY, 3, pl.h);
  }
}

function drawFlag() {
  var sx = wxS(gs.flagX);
  if (sx < -30 || sx > W + 30) return;
  ctx.fillStyle = '#8B6914'; ctx.fillRect(sx, GROUND_Y - 85, 4, 85);
  var wave = Math.sin(gs.frame * 0.08) * 5;
  ctx.fillStyle = '#E8800A';
  ctx.beginPath(); ctx.moveTo(sx+4, GROUND_Y-85); ctx.lineTo(sx+36, GROUND_Y-72+wave); ctx.lineTo(sx+4, GROUND_Y-59); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#1A0E00'; ctx.font = '5px "Courier New",monospace';
  ctx.fillText('END', sx + 6, GROUND_Y - 70 + wave);
}

function drawHopCone(cx, cy, r) {
  ctx.save(); ctx.translate(cx, cy);
  var s = r / 10;
  ctx.strokeStyle = '#3D7A00'; ctx.lineWidth = 2.2 * s; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(0, -r*0.95); ctx.bezierCurveTo(3*s, -r*1.1, 4*s, -r*1.28, 2*s, -r*1.5); ctx.stroke();
  ctx.lineCap = 'butt';
  ctx.fillStyle = '#1A4800';
  ctx.beginPath();
  ctx.moveTo(0, -r*0.92);
  ctx.bezierCurveTo(r*0.82, -r*0.48, r*0.98, r*0.22, 0, r*1.02);
  ctx.bezierCurveTo(-r*0.98, r*0.22, -r*0.82, -r*0.48, 0, -r*0.92);
  ctx.fill();
  ctx.fillStyle = '#52AA00';
  ctx.beginPath();
  ctx.moveTo(0, -r*0.82);
  ctx.bezierCurveTo(r*0.72, -r*0.40, r*0.88, r*0.18, 0, r*0.90);
  ctx.bezierCurveTo(-r*0.88, r*0.18, -r*0.72, -r*0.40, 0, -r*0.82);
  ctx.fill();
  var rows = [
    {y:-r*0.60, br:[{x:-r*0.18,bw:r*0.46,bh:r*0.38,rot:-18},{x:r*0.18,bw:r*0.46,bh:r*0.38,rot:18}]},
    {y:-r*0.25, br:[{x:-r*0.38,bw:r*0.40,bh:r*0.34,rot:-30},{x:0,bw:r*0.44,bh:r*0.36,rot:0},{x:r*0.38,bw:r*0.40,bh:r*0.34,rot:30}]},
    {y:r*0.10,  br:[{x:-r*0.42,bw:r*0.36,bh:r*0.32,rot:-36},{x:-r*0.14,bw:r*0.40,bh:r*0.34,rot:-10},{x:r*0.14,bw:r*0.40,bh:r*0.34,rot:10},{x:r*0.42,bw:r*0.36,bh:r*0.32,rot:36}]},
    {y:r*0.42,  br:[{x:-r*0.34,bw:r*0.32,bh:r*0.28,rot:-28},{x:0,bw:r*0.36,bh:r*0.30,rot:0},{x:r*0.34,bw:r*0.32,bh:r*0.28,rot:28}]},
    {y:r*0.70,  br:[{x:-r*0.18,bw:r*0.26,bh:r*0.22,rot:-15},{x:r*0.18,bw:r*0.26,bh:r*0.22,rot:15}]}
  ];
  var bFills = ['#3A9000','#5CBF00','#78D900','#4AAA00','#62C800'];
  for (var ri = 0; ri < rows.length; ri++) {
    var row = rows[ri];
    for (var bi2 = 0; bi2 < row.br.length; bi2++) {
      var br = row.br[bi2];
      ctx.save(); ctx.translate(br.x, row.y); ctx.rotate(br.rot * Math.PI / 180);
      var bw = br.bw, bh = br.bh;
      ctx.fillStyle = bFills[ri % bFills.length];
      ctx.beginPath(); ctx.moveTo(0,-bh*0.85); ctx.bezierCurveTo(bw*0.55,-bh*0.55,bw*0.65,bh*0.15,0,bh*0.92); ctx.bezierCurveTo(-bw*0.65,bh*0.15,-bw*0.55,-bh*0.55,0,-bh*0.85); ctx.fill();
      ctx.strokeStyle = '#1A4800'; ctx.lineWidth = 1.1 * s;
      ctx.beginPath(); ctx.moveTo(0,-bh*0.85); ctx.bezierCurveTo(bw*0.55,-bh*0.55,bw*0.65,bh*0.15,0,bh*0.92); ctx.bezierCurveTo(-bw*0.65,bh*0.15,-bw*0.55,-bh*0.55,0,-bh*0.85); ctx.stroke();
      ctx.strokeStyle = '#1E6600'; ctx.lineWidth = 0.9 * s;
      ctx.beginPath(); ctx.moveTo(0,-bh*0.65); ctx.lineTo(0, bh*0.65); ctx.stroke();
      ctx.restore();
    }
  }
  ctx.restore();
}

function drawHops() {
  for (var hi = 0; hi < gs.hops.length; hi++) {
    var h = gs.hops[hi]; if (h.collected) continue;
    var sx = wxS(h.wx); if (sx < -30 || sx > W + 30) continue;
    var bob = Math.sin(gs.frame * 0.07 + h.bobOff) * 3;
    drawHopCone(sx, h.cy + bob, h.r);
  }
}

function drawPowerups() {
  for (var i = 0; i < gs.powerups.length; i++) {
    var pu = gs.powerups[i]; if (pu.collected) continue;
    var sx = wxS(pu.wx); if (sx < -30 || sx > W + 30) continue;
    var bob = Math.sin(gs.frame * 0.08 + pu.bobOff) * 3, cy = pu.cy + bob;
    ctx.save(); ctx.translate(sx, cy);
    if (pu.type === 'bottle') {
      ctx.fillStyle = '#3A7800'; ctx.fillRect(-5,-14,10,18);
      ctx.fillStyle = '#5AAA18'; ctx.fillRect(-4,-13,4,8);
      ctx.fillStyle = '#77BB33'; ctx.fillRect(-3,-18,6,5);
      ctx.fillStyle = '#FFFDE7'; ctx.fillRect(-2,-20,4,3);
      ctx.fillStyle = '#FFFDE7'; ctx.font = 'bold 7px "Courier New",monospace'; ctx.textAlign = 'center'; ctx.fillText('B', 0, -2); ctx.textAlign = 'left';
    } else if (pu.type === 'star') {
      ctx.fillStyle = '#FFD700';
      ctx.beginPath();
      for (var sp = 0; sp < 10; sp++) {
        var sang = sp * Math.PI / 5 - Math.PI / 2, srad = sp % 2 === 0 ? 12 : 5;
        if (sp === 0) ctx.moveTo(Math.cos(sang)*srad, Math.sin(sang)*srad);
        else ctx.lineTo(Math.cos(sang)*srad, Math.sin(sang)*srad);
      }
      ctx.closePath(); ctx.fill();
      ctx.strokeStyle = '#FFA500'; ctx.lineWidth = 1.5; ctx.stroke();
    } else if (pu.type === 'speed') {
      ctx.fillStyle = '#00CCFF';
      ctx.beginPath(); ctx.moveTo(4,-14); ctx.lineTo(-2,-2); ctx.lineTo(3,-2); ctx.lineTo(-4,14); ctx.lineTo(2,2); ctx.lineTo(-3,2); ctx.closePath(); ctx.fill();
    }
    ctx.restore();
  }
}

function drawEnemies() {
  for (var ei = 0; ei < gs.enemies.length; ei++) {
    var en = gs.enemies[ei], sx = wxS(en.wx);
    if (sx + en.w < -10 || sx > W + 10) continue;
    if (en.type === 'keg') drawEnemyKeg(sx, en.y, en.w, en.h, en.frame, en.vx);
    else drawEnemyGoblin(sx, en.y, en.w, en.h, en.frame, en.vx);
  }
}

function drawEnemyKeg(sx, fy, w, h, frame, vx) {
  var ty = fy - h;
  ctx.save(); ctx.translate(sx+w/2, ty+h/2); ctx.rotate((vx>0?1:-1)*frame*0.18);
  ctx.fillStyle = '#7A7A7A'; ctx.fillRect(-w/2,-h/2,w,h);
  ctx.fillStyle = '#8A8A8A'; ctx.fillRect(-w/2-3,-h*0.18,w+6,h*0.36);
  ctx.strokeStyle = '#BBBBBB'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(-w/2-1,-h/2+5); ctx.lineTo(w/2+1,-h/2+5); ctx.moveTo(-w/2-1,h/2-6); ctx.lineTo(w/2+1,h/2-6); ctx.stroke();
  ctx.fillStyle = '#B87333'; ctx.fillRect(-w*0.18,-h/2-7,w*0.36,9);
  ctx.fillStyle = '#E8800A'; ctx.beginPath(); ctx.arc(0,-h/2-7,4,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#FFEEAA'; ctx.fillRect(-7,-h*0.12,5,5); ctx.fillRect(2,-h*0.12,5,5);
  ctx.fillStyle = '#330000'; ctx.fillRect(-6,-h*0.10,3,3); ctx.fillRect(3,-h*0.10,3,3);
  ctx.strokeStyle = '#330000'; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(-6,h*0.08); ctx.lineTo(6,h*0.08); ctx.stroke();
  ctx.restore();
}

function drawEnemyGoblin(sx, fy, w, h, frame, vx) {
  var waddle = Math.sin(frame * Math.PI * 0.5) * 5;
  ctx.save(); ctx.translate(sx+w/2, (fy-h)+h/2);
  if (vx < 0) ctx.scale(-1,1);
  var bw = w*0.5, bh = h*0.46;
  ctx.fillStyle = '#FFFDE7'; ctx.beginPath(); ctx.arc(0,bh*0.1,bw,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#E8800A'; ctx.beginPath(); ctx.arc(0,-bh*0.14,bw*0.52,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#330000';
  if (frame !== 3) { ctx.beginPath(); ctx.arc(-bw*0.2,-bh*0.22,4,0,Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(bw*0.2,-bh*0.22,4,0,Math.PI*2); ctx.fill(); }
  else { ctx.fillRect(-bw*0.3,-bh*0.2,bw*0.18,2); ctx.fillRect(bw*0.1,-bh*0.2,bw*0.18,2); }
  ctx.strokeStyle = '#330000'; ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.moveTo(-bw*0.3,-bh*0.33); ctx.lineTo(-bw*0.08,-bh*0.26); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(bw*0.3,-bh*0.33); ctx.lineTo(bw*0.08,-bh*0.26); ctx.stroke();
  ctx.fillStyle = '#E8800A';
  ctx.fillRect(-bw*0.44,bh*0.55+waddle,bw*0.33,bh*0.44);
  ctx.fillRect(bw*0.1,bh*0.55-waddle,bw*0.33,bh*0.44);
  ctx.fillStyle = '#663300';
  ctx.fillRect(-bw*0.5,bh*0.9+waddle,bw*0.4,bh*0.11);
  ctx.fillRect(bw*0.05,bh*0.9-waddle,bw*0.4,bh*0.11);
  ctx.restore();
}

function drawBoss() {
  var b = gs.boss, sx = wxS(b.wx), fy = b.y;
  if (b.phase === 'hurt' && Math.floor(b.hurtTimer/4) % 2 === 0) ctx.globalAlpha = 0.3;
  ctx.save(); ctx.translate(sx+b.w/2, fy);
  if (b.vx > 0) ctx.scale(-1,1);
  var bw = b.w, bh = b.h;
  var stride = Math.sin(b.timer * 0.15) * 10;
  ctx.fillStyle = '#2A1000'; ctx.fillRect(-bw*0.28,-bh*0.22+stride,bw*0.22,bh*0.24); ctx.fillRect(bw*0.06,-bh*0.22-stride,bw*0.22,bh*0.24);
  ctx.fillStyle = '#1A0800'; ctx.fillRect(-bw*0.34,-bh*0.02+stride,bw*0.3,bh*0.08); ctx.fillRect(bw*0.04,-bh*0.02-stride,bw*0.3,bh*0.08);
  ctx.fillStyle = '#5C2800'; ctx.fillRect(-bw*0.44,-bh*0.82,bw*0.88,bh*0.64);
  ctx.fillStyle = '#F5E6C0'; ctx.fillRect(-bw*0.30,-bh*0.78,bw*0.60,bh*0.56);
  ctx.fillStyle = '#2A1200'; ctx.fillRect(-bw*0.44,-bh*0.30,bw*0.88,bh*0.08);
  ctx.fillStyle = '#E8800A'; ctx.fillRect(-bw*0.06,-bh*0.32,bw*0.12,bh*0.12);
  ctx.fillStyle = '#5C2800'; ctx.fillRect(bw*0.44,-bh*0.56,bw*0.28,bh*0.22); ctx.fillRect(-bw*0.72,-bh*0.72,bw*0.30,bh*0.20);
  ctx.fillStyle = '#FDBCB4'; ctx.fillRect(-bw*0.30,-bh*1.0,bw*0.60,bh*0.24);
  ctx.fillStyle = '#1A0E00'; ctx.fillRect(-bw*0.18,-bh*0.90,bw*0.09,bw*0.09); ctx.fillRect(bw*0.09,-bh*0.90,bw*0.09,bw*0.09);
  ctx.fillStyle = '#3A1A00'; ctx.fillRect(-bw*0.24,-bh*0.74,bw*0.48,bh*0.06);
  ctx.fillStyle = '#FFFDE7'; ctx.fillRect(-bw*0.32,-bh*1.42,bw*0.64,bh*0.46); ctx.fillRect(-bw*0.40,-bh*1.04,bw*0.80,bh*0.07);
  ctx.restore(); ctx.globalAlpha = 1;
  var barW = 130, barH = 10, barX = wxS(b.wx+b.w/2)-barW/2, barY = b.y-b.h-24;
  ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.fillRect(barX-2,barY-2,barW+4,barH+4);
  ctx.fillStyle = '#660000'; ctx.fillRect(barX,barY,barW,barH);
  ctx.fillStyle = '#FF3333'; ctx.fillRect(barX,barY,barW*(b.hp/b.maxHp),barH);
  ctx.fillStyle = '#FFD700'; ctx.font = '6px "Courier New",monospace'; ctx.textAlign = 'center';
  ctx.fillText('BREWMASTER', barX+barW/2, barY-4); ctx.textAlign = 'left';
}

function drawProjectiles() {
  for (var i = 0; i < gs.projectiles.length; i++) {
    var pr = gs.projectiles[i]; if (!pr.alive) continue;
    var sx = wxS(pr.wx), ang = Math.atan2(pr.vy, pr.vx);
    ctx.save(); ctx.translate(sx, pr.y); ctx.rotate(ang + Math.PI/2);
    ctx.fillStyle = '#88AA44'; ctx.fillRect(-4,-9,8,14);
    ctx.fillStyle = '#BBDD66'; ctx.fillRect(-2,-13,4,5);
    ctx.fillStyle = '#FFFDE7'; ctx.fillRect(-2,-14,4,2);
    ctx.restore();
  }
}

function drawPlayerProjectiles() {
  for (var i = 0; i < gs.playerProjectiles.length; i++) {
    var pr = gs.playerProjectiles[i]; if (!pr.alive) continue;
    var sx = wxS(pr.wx), ang = Math.atan2(pr.vy, pr.vx);
    ctx.save(); ctx.translate(sx, pr.y); ctx.rotate(ang + Math.PI/2);
    ctx.fillStyle = '#66BB00'; ctx.fillRect(-4,-9,8,14);
    ctx.fillStyle = '#AADE55'; ctx.fillRect(-3,-8,3,7);
    ctx.fillStyle = '#88CC44'; ctx.fillRect(-3,-13,6,5);
    ctx.fillStyle = '#FFFDE7'; ctx.fillRect(-2,-14,4,2);
    ctx.restore();
  }
}

function drawCapsule(x1, y1, x2, y2, r, col) {
  var dx = x2-x1, dy = y2-y1, len = Math.sqrt(dx*dx+dy*dy)||0.01;
  var nx = -dy/len*r, ny = dx/len*r;
  ctx.fillStyle = col;
  ctx.beginPath();
  ctx.moveTo(x1+nx, y1+ny); ctx.lineTo(x2+nx, y2+ny);
  ctx.arc(x2, y2, r, Math.atan2(ny,nx), Math.atan2(-ny,-nx), false);
  ctx.lineTo(x1-nx, y1-ny);
  ctx.arc(x1, y1, r, Math.atan2(-ny,-nx), Math.atan2(ny,nx), false);
  ctx.closePath(); ctx.fill();
}

function drawPlayer() {
  var p = gs.player, sx = wxS(p.x), fy = p.y, pw = p.w, ph = p.h;
  var hasStar = p.powerType === 'star';
  var flash = gs.invincible > 0 && !hasStar && Math.floor(gs.invincible/6) % 2 === 0;

  ctx.globalAlpha = flash ? 0.08 : 0.22;
  ctx.fillStyle = 'rgba(0,0,0,0.8)';
  ctx.beginPath(); ctx.save();ctx.translate(sx+pw/2,fy+3);ctx.scale(pw*0.7,5);ctx.arc(0,0,1,0,Math.PI*2);ctx.restore(); ctx.fill();
  ctx.globalAlpha = 1;

  if (flash) ctx.globalAlpha = 0.28;
  ctx.save();
  ctx.translate(sx + pw/2, fy);
  if (!p.facingRight) ctx.scale(-1, 1);

  var og = p.onGround, mv = Math.abs(p.vx) > 0.3, air = !p.onGround, rf = p.runFrame;
  var runAngles = [[30,-20,-20,15],[40,-28,-28,22],[30,-20,-20,15],[10,-5,-8,5],[-15,22,15,-16],[-28,35,22,-24],[-20,28,15,-18],[-5,10,5,-8]];
  var fLegAng = 0, bLegAng = 0, fArmAng = 0, bArmAng = 0, bodyBob = 0;
  if (og && mv) { fLegAng=runAngles[rf][0]; bLegAng=runAngles[rf][1]; fArmAng=runAngles[rf][2]; bArmAng=runAngles[rf][3]; bodyBob=Math.abs(Math.sin(rf*Math.PI/4))*2.5; }
  else if (air) { fLegAng=p.vy<0?-20:25; bLegAng=p.vy<0?15:-15; fArmAng=p.vy<0?-35:-20; bArmAng=p.vy<0?25:15; bodyBob=-2; }
  else { bodyBob = Math.sin(gs.frame*0.05)*1.5; }

  var thighL=14, shinL=13, uArmL=13, fArmL=11;
  var hipY=-28+bodyBob, hipX=0, shoulderY=-ph+20+bodyBob, shoulderX=0;

  // Back leg
  ctx.globalAlpha = flash ? 0.12 : 0.52;
  var bLegR=deg(bLegAng), bKneeX=hipX+Math.sin(bLegR)*thighL, bKneeY=hipY+Math.cos(bLegR)*thighL;
  var bShinAng=bLegR+deg(bLegAng>0?18:-8), bAnkleX=bKneeX+Math.sin(bShinAng)*shinL, bAnkleY=bKneeY+Math.cos(bShinAng)*shinL;
  drawCapsule(hipX,hipY,bKneeX,bKneeY,4.5,'#5A2808');
  drawCapsule(bKneeX,bKneeY,bAnkleX,bAnkleY,3.5,'#4A2006');
  ctx.fillStyle='#221000'; ctx.beginPath();ctx.save();ctx.translate(bAnkleX+6,bAnkleY+1);ctx.rotate(deg(10));ctx.scale(9,4.5);ctx.arc(0,0,1,0,Math.PI*2);ctx.restore();ctx.fill();

  // Back arm
  ctx.globalAlpha = flash ? 0.10 : 0.48;
  var bArmR=deg(bArmAng), bElbowX=shoulderX+Math.sin(bArmR)*uArmL, bElbowY=shoulderY+Math.cos(bArmR)*uArmL;
  var bWristX=bElbowX+Math.sin(bArmR+deg(bArmAng>0?12:-8))*fArmL, bWristY=bElbowY+Math.cos(bArmR+deg(bArmAng>0?12:-8))*fArmL;
  drawCapsule(shoulderX,shoulderY,bElbowX,bElbowY,4,'#6B3010');
  drawCapsule(bElbowX,bElbowY,bWristX,bWristY,3,'#5A2808');

  // Torso
  ctx.globalAlpha = flash ? 0.22 : 1;
  ctx.fillStyle='#8B4513';
  ctx.beginPath(); ctx.moveTo(-7,hipY+2); ctx.bezierCurveTo(-8,hipY-4,-9,shoulderY+14,-8,shoulderY+6); ctx.lineTo(8,shoulderY+6); ctx.bezierCurveTo(9,shoulderY+14,8,hipY-4,7,hipY+2); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#F0E8D0';
  ctx.beginPath(); ctx.moveTo(0,hipY+1); ctx.bezierCurveTo(0,hipY-3,1,shoulderY+14,1,shoulderY+8); ctx.lineTo(9,shoulderY+8); ctx.bezierCurveTo(9,shoulderY+14,7,hipY-3,6,hipY+1); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#3A1A00'; ctx.fillRect(-8,hipY-1,16,4);
  ctx.fillStyle='#C8A030'; ctx.fillRect(-3,hipY-2,6,5);

  // Front arm
  ctx.globalAlpha = flash ? 0.22 : 1;
  var fArmR=deg(fArmAng), fElbowX=shoulderX+Math.sin(fArmR)*uArmL, fElbowY=shoulderY+Math.cos(fArmR)*uArmL;
  var fBend=fArmAng<0?-15:10;
  var fWristX=fElbowX+Math.sin(fArmR+deg(fBend))*fArmL, fWristY=fElbowY+Math.cos(fArmR+deg(fBend))*fArmL;
  drawCapsule(shoulderX,shoulderY,fElbowX,fElbowY,4.5,'#8B4513');
  drawCapsule(fElbowX,fElbowY,fWristX,fWristY,3.5,'#7A3A10');
  ctx.fillStyle='#FDBCB4'; ctx.beginPath(); ctx.arc(fWristX,fWristY,4,0,Math.PI*2); ctx.fill();
  // Mug
  ctx.fillStyle='#E8800A'; ctx.fillRect(fWristX+1,fWristY-4,10,12);
  ctx.strokeStyle='#B85F00'; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(fWristX+14,fWristY+2,5,Math.PI*0.3,Math.PI*1.7); ctx.stroke();
  ctx.fillStyle='#FFFDE7'; ctx.fillRect(fWristX,fWristY-7,12,5);
  ctx.beginPath(); ctx.arc(fWristX+2,fWristY-6,3,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(fWristX+6,fWristY-8,3,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(fWristX+10,fWristY-6,3,0,Math.PI*2); ctx.fill();

  // Head
  ctx.globalAlpha = flash ? 0.22 : 1;
  var headCX=3, headCY=shoulderY-10;
  drawCapsule(shoulderX+1,shoulderY+5,headCX,headCY+11,3.5,'#FDBCB4');
  ctx.fillStyle='#FDBCB4'; ctx.beginPath();ctx.save();ctx.translate(headCX,headCY);ctx.rotate(deg(-5));ctx.scale(11,9);ctx.arc(0,0,1,0,Math.PI*2);ctx.restore();ctx.fill();
  ctx.fillStyle='#EFAA94'; ctx.beginPath();ctx.save();ctx.translate(headCX+2,headCY+4);ctx.rotate(deg(10));ctx.scale(7,5);ctx.arc(0,0,1,0,Math.PI);ctx.restore();ctx.fill();
  ctx.fillStyle='#E09080';
  ctx.beginPath(); ctx.moveTo(headCX+9,headCY+1); ctx.bezierCurveTo(headCX+14,headCY-1,headCX+15,headCY+4,headCX+10,headCY+5); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#FDBCB4'; ctx.beginPath();ctx.save();ctx.translate(headCX-9,headCY+1);ctx.rotate(deg(-10));ctx.scale(3.5,5);ctx.arc(0,0,1,0,Math.PI*2);ctx.restore();ctx.fill();
  // Eye
  var eyeX=headCX+5, eyeY=headCY-2;
  ctx.fillStyle='#FFFFFF'; ctx.beginPath(); ctx.save();ctx.translate(eyeX,eyeY);ctx.scale(5,4);ctx.arc(0,0,1,0,Math.PI*2);ctx.restore(); ctx.fill();
  ctx.fillStyle='#2A5AAA'; ctx.beginPath(); ctx.arc(eyeX+1,eyeY,3,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#1A0E00'; ctx.beginPath(); ctx.arc(eyeX+1.5,eyeY,1.5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.7)'; ctx.beginPath(); ctx.arc(eyeX+2.5,eyeY-1,1,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#3A1A00'; ctx.lineWidth=1.5; ctx.beginPath(); ctx.save();ctx.translate(eyeX,eyeY);ctx.scale(5,4);ctx.arc(0,0,1,Math.PI,Math.PI*2);ctx.restore(); ctx.stroke();
  ctx.strokeStyle='#3A2010'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(eyeX-4,eyeY-6); ctx.bezierCurveTo(eyeX-1,eyeY-8,eyeX+3,eyeY-8,eyeX+5,eyeY-5); ctx.stroke();
  // Mustache
  ctx.fillStyle='#3A2010';
  ctx.beginPath(); ctx.moveTo(headCX+6,headCY+5); ctx.bezierCurveTo(headCX+10,headCY+3,headCX+14,headCY+5,headCX+13,headCY+7); ctx.bezierCurveTo(headCX+12,headCY+9,headCX+8,headCY+8,headCX+6,headCY+6); ctx.closePath(); ctx.fill();
  // Hat
  var hatBaseY = headCY-7;
  ctx.fillStyle='#F8F6EA'; ctx.beginPath(); ctx.moveTo(headCX-7,hatBaseY); ctx.lineTo(headCX+10,hatBaseY); ctx.lineTo(headCX+9,hatBaseY-22); ctx.lineTo(headCX-6,hatBaseY-22); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.save();ctx.translate(headCX+1.5,hatBaseY-22);ctx.scale(7.5,4);ctx.arc(0,0,1,Math.PI,Math.PI*2);ctx.restore(); ctx.fill();
  ctx.fillStyle='#E8E0C8'; ctx.beginPath(); ctx.save();ctx.translate(headCX+1.5,hatBaseY);ctx.scale(9,4);ctx.arc(0,0,1,0,Math.PI*2);ctx.restore(); ctx.fill();

  // Front leg
  ctx.globalAlpha = flash ? 0.22 : 1;
  var fLegR=deg(fLegAng), fKneeX=hipX+Math.sin(fLegR)*thighL, fKneeY=hipY+Math.cos(fLegR)*thighL;
  var fShinAng=fLegR+deg(fLegAng>0?20:-10), fAnkleX=fKneeX+Math.sin(fShinAng)*shinL, fAnkleY=fKneeY+Math.cos(fShinAng)*shinL;
  drawCapsule(hipX,hipY,fKneeX,fKneeY,5,'#8B4513');
  drawCapsule(fKneeX,fKneeY,fAnkleX,fAnkleY,4,'#7A3A10');
  ctx.fillStyle='#2A1000'; ctx.beginPath();ctx.save();ctx.translate(fAnkleX+7,fAnkleY+1);ctx.rotate(deg(8));ctx.scale(10,5);ctx.arc(0,0,1,0,Math.PI*2);ctx.restore();ctx.fill();

  // Star shimmer — source-atop masks color to drawn pixels only
  if (hasStar) {
    ctx.globalCompositeOperation = 'source-atop';
    ctx.globalAlpha = 0.45;
    ctx.fillStyle = 'hsl(' + (Math.floor(gs.frame*5)%360) + ',100%,60%)';
    ctx.fillRect(-36, -ph-26, 74, ph+42);
    ctx.globalCompositeOperation = 'source-over';
  }

  ctx.restore();
  ctx.globalAlpha = 1;
}

function drawParticles() {
  for (var i = 0; i < gs.particles.length; i++) {
    var pt = gs.particles[i];
    ctx.globalAlpha = pt.alpha; ctx.fillStyle = pt.color || '#FFFDE7';
    ctx.beginPath(); ctx.arc(pt.x, pt.y, pt.r, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawHUD(wt) {
  var p = gs.player, wnum = gs.world+1, znum = gs.zone+1;
  ctx.fillStyle = 'rgba(0,0,0,0.58)'; ctx.fillRect(6,6,320,30);
  ctx.font = '8px "Courier New",monospace';
  ctx.fillStyle = '#FFD700'; ctx.fillText(wnum+'-'+znum, 10, 26);
  ctx.fillStyle = wt.acc; ctx.fillText('HOPS', 50, 26);
  ctx.fillStyle = '#F5E6C0'; ctx.fillText(gs.score, 106, 26);
  ctx.fillStyle = wt.acc; ctx.fillText('BEST', 178, 26);
  ctx.fillStyle = '#F5E6C0'; ctx.fillText(gs.best, 232, 26);
  ctx.fillStyle = 'rgba(0,0,0,0.42)'; ctx.fillRect(6,38,220,18);
  ctx.font = '6px "Courier New",monospace'; ctx.fillStyle = wt.acc;
  ctx.fillText('W'+wnum+': '+WORLDS[gs.world].name, 10, 51);
  // Lives as mugs (ASCII safe)
  ctx.font = '14px "Courier New",monospace';
  for (var i = 0; i < gs.lives; i++) ctx.fillText('[B]', W-38-i*30, 27);
  // 1UP bar
  var hopProg = (gs.hopCount % 100) / 100, barW=90, barX=W-barW-8, barY=36;
  ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(barX-2,barY-2,barW+4,12);
  ctx.fillStyle = '#442200'; ctx.fillRect(barX,barY,barW,8);
  ctx.fillStyle = '#FF88AA'; ctx.fillRect(barX,barY,barW*hopProg,8);
  ctx.font = '5px "Courier New",monospace'; ctx.fillStyle = '#F5E6C0';
  ctx.fillText('1UP '+(gs.hopCount%100)+'/100', barX, barY+18);
  // Bottles
  ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(6,58,130,18);
  ctx.fillStyle = '#88AA44'; ctx.font = '6px "Courier New",monospace';
  ctx.fillText('THROW:', 10, 71);
  for (var b = 0; b < p.maxBottles; b++) {
    ctx.fillStyle = b < p.bottles ? '#66BB00' : '#333300';
    ctx.fillRect(72+b*10, 62, 7, 12);
  }
  // Power bar
  if (p.powerType && p.powerTimer > 0) {
    var pBarW=130, pBarX=6, pBarY=80;
    ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(pBarX-2,pBarY-2,pBarW+4,12);
    var pCol = p.powerType==='star'?'#FFD700':p.powerType==='speed'?'#00CCFF':'#88AA44';
    ctx.fillStyle = '#220800'; ctx.fillRect(pBarX,pBarY,pBarW,8);
    ctx.fillStyle = pCol; ctx.fillRect(pBarX,pBarY,pBarW*(p.powerTimer/480),8);
    ctx.font = '5px "Courier New",monospace'; ctx.fillStyle = '#F5E6C0';
    ctx.fillText(p.powerType==='star'?'STAR POWER':p.powerType==='speed'?'SPEED BREW':'PWR', pBarX+2, pBarY+18);
  }
  if (gs.zone===3 && gs.boss && gs.boss.alive) {
    ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(W/2-90,6,180,18);
    ctx.font='6px "Courier New",monospace'; ctx.fillStyle='#FF4444'; ctx.textAlign='center';
    ctx.fillText('STOMP OR THROW 3X!', W/2, 19); ctx.textAlign='left';
  }
}

function drawTransition() {
  var t = gs.transTimer, al = Math.min(1, t/30);
  ctx.fillStyle = 'rgba(0,0,0,'+al+')'; ctx.fillRect(0,0,W,H);
  if (t > 40) {
    ctx.textAlign = 'center';
    ctx.font = '14px "Courier New",monospace'; ctx.fillStyle = '#E8800A';
    ctx.fillText(gs.zone===3?'BOSS DEFEATED!':'ZONE CLEAR!', W/2, H/2-24);
    ctx.font = '9px "Courier New",monospace'; ctx.fillStyle = '#F5E6C0';
    var nz=gs.zone+1, nw=gs.world+1;
    if (nz>=4) ctx.fillText('WORLD '+nw+' COMPLETE!', W/2, H/2+10);
    else ctx.fillText('ZONE '+nw+'-'+nz, W/2, H/2+10);
    ctx.textAlign = 'left';
  }
}

var overlay = document.getElementById('overlay');
var ovTitle = document.getElementById('ov-title');
var ovSub   = document.getElementById('ov-sub');
var ovScore = document.getElementById('ov-score');
var ovBtn   = document.getElementById('ov-btn');

function showStart() {
  overlay.classList.remove('hidden');
  ovTitle.textContent = 'HOP RUNNER';
  ovSub.style.display = 'block';
  ovSub.innerHTML = 'D-pad: move &mdash; JUMP: hop (double-jump!)<br>THROW bottles at enemies! Collect power-ups!<br>100 hops = 1UP &bull; Stomp the Brewmaster!';
  ovScore.style.display = 'none';
  ovBtn.textContent = 'TAP TO BREW';
}
function showGameOver() {
  overlay.classList.remove('hidden');
  ovTitle.textContent = 'KEG TIPPED!';
  ovSub.style.display = 'none'; ovScore.style.display = 'block';
  if (gs.score > gs.best) gs.best = gs.score;
  ovScore.innerHTML = 'HOPS: '+gs.score+'<br>BEST: '+gs.best+'<br>REACHED: W'+(gs.world+1)+'-'+(gs.zone+1);
  ovBtn.textContent = 'BREW AGAIN';
}
function showVictory() {
  gs.running = false; overlay.classList.remove('hidden');
  ovTitle.textContent = 'YOU WIN!';
  ovSub.style.display = 'none'; ovScore.style.display = 'block';
  if (gs.score > gs.best) gs.best = gs.score;
  ovScore.innerHTML = 'FINAL HOPS: '+gs.score+'<br>ALL 8 WORLDS CLEARED!';
  ovBtn.textContent = 'PLAY AGAIN';
}
function startGame() { gs = initGs(); gs.running = true; buildZone(gs.world, gs.zone); overlay.classList.add('hidden'); }
function endGame() { gs.running = false; gs.gameOver = true; if (gs.score > gs.best) gs.best = gs.score; setTimeout(showGameOver, 600); }

ovBtn.addEventListener('click', startGame);

document.addEventListener('keydown', function(e) {
  if (e.code==='ArrowLeft'  ||e.key==='a'||e.key==='A') keys.left=true;
  if (e.code==='ArrowRight' ||e.key==='d'||e.key==='D') keys.right=true;
  if (e.code==='Space'||e.code==='ArrowUp'||e.key==='w'||e.key==='W'){e.preventDefault();keys.jump=true;}
  if (e.code==='KeyX'||e.key==='x'||e.key==='X') keys.throwBtn=true;
});
document.addEventListener('keyup', function(e) {
  if (e.code==='ArrowLeft'  ||e.key==='a'||e.key==='A') keys.left=false;
  if (e.code==='ArrowRight' ||e.key==='d'||e.key==='D') keys.right=false;
  if (e.code==='Space'||e.code==='ArrowUp'||e.key==='w'||e.key==='W') keys.jump=false;
  if (e.code==='KeyX'||e.key==='x'||e.key==='X') keys.throwBtn=false;
});

function bindBtn(id, kn) {
  var el = document.getElementById(id);
  var press   = function(e) { e.preventDefault(); keys[kn]=true;  el.classList.add('pressed'); };
  var release = function(e) { e.preventDefault(); keys[kn]=false; el.classList.remove('pressed'); };
  el.addEventListener('touchstart',  press,   {passive:false});
  el.addEventListener('touchend',    release, {passive:false});
  el.addEventListener('touchcancel', release, {passive:false});
  el.addEventListener('mousedown',  press);
  el.addEventListener('mouseup',    release);
  el.addEventListener('mouseleave', release);
}
bindBtn('dp-left',  'left');
bindBtn('dp-right', 'right');
bindBtn('dp-up',    'jump');
bindBtn('btn-jump', 'jump');
bindBtn('btn-throw','throwBtn');

function loop() { update(); draw(); requestAnimationFrame(loop); }
buildZone(0, 0);
showStart();
loop();

})();
</script>
